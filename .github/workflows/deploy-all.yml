name: Deploy (all production environments)

# Triggered by a tag of the form v<semver>-all, e.g. v1.2.3-all.
# Discovers every GitHub environment whose name contains "production",
# builds the image once, then fans out a parallel deploy job per environment.
# Each environment's own secrets (SSH_HOST, etc.) and protection rules apply.
#
# Requires: ENVIRONMENTS_TOKEN secret — a fine-grained PAT with
#           Repository > Environments > Read permission.
on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*-all'

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.list.outputs.environments }}
    steps:
      - name: List production environments
        id: list
        run: |
          ENVS=$(gh api "repos/${{ github.repository }}/environments" \
            --jq '[.environments[].name | select(contains("production"))]')
          echo "environments=${ENVS}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.ENVIRONMENTS_TOKEN }}

  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
      repo: ${{ steps.meta.outputs.repo }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image reference
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          SEMVER=$(echo "${{ github.ref_name }}" | grep -oE '^v[0-9]+\.[0-9]+\.[0-9]+')
          echo "image=ghcr.io/${REPO_LC}:sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "repo=ghcr.io/${REPO_LC}" >> "$GITHUB_OUTPUT"
          echo "semver_tag=ghcr.io/${REPO_LC}:${SEMVER}" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.meta.outputs.repo }}:latest
            ${{ steps.meta.outputs.semver_tag }}
          build-args: |
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ github.ref_name }}
            IMAGE_SOURCE=https://github.com/${{ github.repository }}

  # One leg per discovered environment, all running in parallel.
  # fail-fast: false ensures a failure in one environment does not cancel the others.
  deploy:
    runs-on: ubuntu-latest
    needs: [discover, build-and-push]
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJson(needs.discover.outputs.environments) }}
    environment: ${{ matrix.environment }}
    permissions:
      contents: read
    env:
      APP_PORT: ${{ vars.APP_PORT || '3000' }}
      PORT: ${{ vars.PORT || '3000' }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/srv/mcp-yt-thumbnailer' }}
      MCP_TRANSPORT: ${{ vars.MCP_TRANSPORT || 'http' }}
      TOKENS_DIR: ${{ vars.TOKENS_DIR || '/data/tokens' }}
      DEDUPE_STORE_PATH: ${{ vars.DEDUPE_STORE_PATH || '/data/dedupe-store.json' }}
      # SSH_PORT should live in vars because it is non-sensitive, but keep a
      # secret fallback so existing environments continue to work unchanged.
      SSH_PORT: ${{ vars.SSH_PORT || secrets.SSH_PORT || '22' }}
      GHCR_USERNAME: ${{ vars.GHCR_USERNAME || github.repository_owner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deployment bundle
        run: |
          set -euo pipefail

          rm -rf "$GITHUB_WORKSPACE/.deploy-tmp"
          mkdir -p "$GITHUB_WORKSPACE/.deploy-tmp"

          cat > "$GITHUB_WORKSPACE/.deploy-tmp/app.env" << ENVEOF
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
          SERVER_BASE_URL=${{ secrets.SERVER_BASE_URL }}
          MCP_TRANSPORT=${{ env.MCP_TRANSPORT }}
          PORT=${{ env.PORT }}
          TOKENS_DIR=${{ env.TOKENS_DIR }}
          DEDUPE_STORE_PATH=${{ env.DEDUPE_STORE_PATH }}
          ENVEOF

          cp "$GITHUB_WORKSPACE/deploy/docker-compose.yml" \
            "$GITHUB_WORKSPACE/.deploy-tmp/docker-compose.yml"
          chmod 600 "$GITHUB_WORKSPACE/.deploy-tmp/app.env"

      - name: Ensure deploy directory exists
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ env.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
            mkdir -p "$DEPLOY_PATH/data/tokens"
            chmod 700 "$DEPLOY_PATH/data"

      - name: Copy deployment bundle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ env.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ./.deploy-tmp/*
          target: ${{ env.DEPLOY_PATH }}
          strip_components: 1

      - name: Deploy to VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ env.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            IMAGE="${{ needs.build-and-push.outputs.image }}"
            APP_PORT="${{ env.APP_PORT }}"
            PORT="${{ env.PORT }}"
            DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
            GHCR_USERNAME="${{ env.GHCR_USERNAME }}"

            cd "$DEPLOY_PATH"
            install -m 600 app.env .env
            rm -f app.env

            echo "${{ secrets.GHCR_TOKEN }}" | \
              docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

            export IMAGE APP_PORT PORT
            # Determine the remote SSH user UID/GID and make them available to
            # docker compose so the service can be started with the host user
            # mapping. Append to the .env file so compose variable substitution
            # picks them up.
            HOST_UID=$(id -u)
            HOST_GID=$(id -g)
            echo "HOST_UID=$HOST_UID" >> .env
            echo "HOST_GID=$HOST_GID" >> .env

            # Validate the copied compose file before pulling; with set -e the
            # workflow stops immediately if docker compose reports an error.
            docker compose config >/dev/null
            docker compose pull
            docker compose up -d --remove-orphans

            echo "Deploy complete – $IMAGE → ${{ matrix.environment }}"
