name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        type: environment

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
      repo: ${{ steps.meta.outputs.repo }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image reference
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${REPO_LC}:sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "repo=ghcr.io/${REPO_LC}" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.meta.outputs.repo }}:latest
          build-args: |
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            VCS_REF=${{ github.sha }}
            VERSION=sha-${{ github.sha }}
            IMAGE_SOURCE=https://github.com/${{ github.repository }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: ${{ inputs.environment || 'production' }}
    permissions: {}

    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            IMAGE="${{ needs.build-and-push.outputs.image }}"
            APP_PORT="${{ vars.APP_PORT || '3000' }}"
            DEPLOY_PATH="${{ vars.DEPLOY_PATH || '/srv/mcp-yt-thumbnailer' }}"

            # Ensure deploy directory and data subdirs exist
            mkdir -p "$DEPLOY_PATH/data/tokens"
            chmod 700 "$DEPLOY_PATH/data"

            # Log in to GHCR so docker can pull the image.
            # GHCR_TOKEN must be a PAT with read:packages scope.
            echo "${{ secrets.GHCR_TOKEN }}" | \
              docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # Write .env
            # GHA resolves ${{ secrets.* }} before this script runs on the VM.
            # A single-quoted heredoc delimiter stops bash from re-expanding
            # any $ characters that appear in the resolved secret values.
            cat > "$DEPLOY_PATH/.env" << 'ENVEOF'
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            SERVER_BASE_URL=${{ secrets.SERVER_BASE_URL }}
            MCP_TRANSPORT=http
            PORT=3000
            TOKENS_DIR=/data/tokens
            DEDUPE_STORE_PATH=/data/dedupe-store.json
            ENVEOF
            chmod 600 "$DEPLOY_PATH/.env"

            # Write docker-compose.yml
            # Unquoted heredoc delimiter so $IMAGE and $APP_PORT expand.
            cat > "$DEPLOY_PATH/docker-compose.yml" << COMPOSEEOF
            services:
              mcp-yt-thumbnailer:
                image: $IMAGE
                restart: unless-stopped
                ports:
                  - "127.0.0.1:${APP_PORT}:3000"
                env_file:
                  - .env
                volumes:
                  - ./data:/data
            COMPOSEEOF

            cd "$DEPLOY_PATH"
            docker compose pull
            docker compose up -d

            echo "Deploy complete – $IMAGE (env: ${{ inputs.environment || 'production' }})"
