name: Deploy

# Triggers:
#   Manual  – workflow_dispatch with a GitHub-managed environment picker.
#   Tag     – push a tag of the form v<semver>-<environment-name>, e.g.
#             v1.2.3-production-eu  →  deploys to the "production-eu" environment.
#
# Both paths converge in the deploy job via the resolve-env job output.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        type: environment
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*-*'

jobs:
  # Runs immediately (no deps). Outputs the target environment name regardless
  # of how the workflow was triggered, so the deploy job stays trigger-agnostic.
  resolve-env:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.name }}
    steps:
      - name: Resolve environment name
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          else
            # Tag format: v1.2.3-<environment-name>
            # Strip the vX.Y.Z- prefix; everything after is the environment name.
            TAG="${{ github.ref_name }}"
            ENV=$(echo "$TAG" | sed -E 's/^v[0-9]+\.[0-9]+\.[0-9]+-//')
            echo "name=${ENV}" >> "$GITHUB_OUTPUT"
          fi

  # Runs immediately in parallel with resolve-env.
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
      repo: ${{ steps.meta.outputs.repo }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image reference
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${REPO_LC}:sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "repo=ghcr.io/${REPO_LC}" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
          # For tag-triggered runs extract the semver portion (e.g. v1.2.3) and
          # push it as an additional image tag. Empty for dispatch runs.
          SEMVER_TAG=""
          if [[ "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-. ]]; then
            SEMVER=$(echo "${{ github.ref_name }}" | grep -oE '^v[0-9]+\.[0-9]+\.[0-9]+')
            SEMVER_TAG="ghcr.io/${REPO_LC}:${SEMVER}"
          fi
          echo "semver_tag=${SEMVER_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.meta.outputs.repo }}:latest
            ${{ steps.meta.outputs.semver_tag }}
          build-args: |
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ github.ref_name }}
            IMAGE_SOURCE=https://github.com/${{ github.repository }}

  # Waits for both jobs above. The environment is resolved dynamically so
  # GitHub applies the correct environment secrets and protection rules.
  deploy:
    runs-on: ubuntu-latest
    needs: [resolve-env, build-and-push]
    environment: ${{ needs.resolve-env.outputs.environment }}
    permissions: {}

    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            IMAGE="${{ needs.build-and-push.outputs.image }}"
            APP_PORT="${{ vars.APP_PORT || '3000' }}"
            DEPLOY_PATH="${{ vars.DEPLOY_PATH || '/srv/mcp-yt-thumbnailer' }}"

            # Ensure deploy directory and data subdirs exist
            mkdir -p "$DEPLOY_PATH/data/tokens"
            chmod 700 "$DEPLOY_PATH/data"

            # Log in to GHCR so docker can pull the image.
            # GHCR_TOKEN must be a PAT with read:packages scope.
            echo "${{ secrets.GHCR_TOKEN }}" | \
              docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # Write .env
            # GHA resolves ${{ secrets.* }} before this script runs on the VM.
            # A single-quoted heredoc delimiter stops bash from re-expanding
            # any $ characters that appear in the resolved secret values.
            cat > "$DEPLOY_PATH/.env" << 'ENVEOF'
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            SERVER_BASE_URL=${{ secrets.SERVER_BASE_URL }}
            MCP_TRANSPORT=http
            PORT=3000
            TOKENS_DIR=/data/tokens
            DEDUPE_STORE_PATH=/data/dedupe-store.json
            ENVEOF
            chmod 600 "$DEPLOY_PATH/.env"

            # Write docker-compose.yml
            # Unquoted heredoc delimiter so $IMAGE and $APP_PORT expand.
            cat > "$DEPLOY_PATH/docker-compose.yml" << COMPOSEEOF
            services:
              mcp-yt-thumbnailer:
                image: $IMAGE
                restart: unless-stopped
                ports:
                  - "127.0.0.1:${APP_PORT}:3000"
                env_file:
                  - .env
                volumes:
                  - ./data:/data
            COMPOSEEOF

            cd "$DEPLOY_PATH"
            docker compose pull
            docker compose up -d

            echo "Deploy complete – $IMAGE (env: ${{ needs.resolve-env.outputs.environment }})"
