name: Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: false
        default: "development"
        type: choice
        options:
          - development
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ github.ref_name }}
            IMAGE_SOURCE=https://github.com/${{ github.repository }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    # Use the named GitHub environment so environment-specific secrets
    # (DOMAIN, SSH_HOST, etc.) are resolved correctly.
    # Tag-triggered runs default to "production"; manual runs use the input.
    environment: ${{ inputs.environment || 'production' }}
    permissions: {}

    steps:
      - name: SSH deploy to VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}"
            DOMAIN="${{ secrets.DOMAIN }}"
            APP_PORT="${{ vars.APP_PORT || '3000' }}"
            DEPLOY_ENV="${{ inputs.environment || 'production' }}"

            # ── Nginx configuration ─────────────────────────────────────────
            NGINX_CONF=/etc/nginx/sites-available/mcp-yt-thumbnailer
            NGINX_LINK=/etc/nginx/sites-enabled/mcp-yt-thumbnailer

            # Webroot directory used by certbot for ACME challenges.
            # See nginx/nginx.conf.template for certbot usage instructions.
            mkdir -p /var/www/certbot

            # Write the nginx config from template variables.
            # nginx variables ($host, $remote_addr, etc.) are written literally
            # by escaping them here; only shell variables expand.
            cat > "$NGINX_CONF" << NGINX_EOF
            # Generated by GitHub Actions deploy workflow – do not edit manually.
            # Environment : $DEPLOY_ENV
            # Domain      : $DOMAIN
            # App port    : $APP_PORT

            # ── HTTP ──────────────────────────────────────────────────────────
            server {
                listen 80;
                listen [::]:80;
                server_name $DOMAIN;

                # ACME challenge webroot – required for Let's Encrypt renewal.
                location /.well-known/acme-challenge/ {
                    root /var/www/certbot;
                    try_files \$uri =404;
                }

                location / {
                    return 301 https://\$host\$request_uri;
                }
            }

            # ── HTTPS ─────────────────────────────────────────────────────────
            server {
                listen 443 ssl;
                listen [::]:443 ssl;
                server_name $DOMAIN;

                # TLS certificates managed by certbot (webroot mode).
                ssl_certificate     /etc/letsencrypt/live/$DOMAIN/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/$DOMAIN/privkey.pem;
                include             /etc/letsencrypt/options-ssl-nginx.conf;
                ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

                # Proxy OAuth2 redirect server (Express on container port 3000).
                location /auth/ {
                    proxy_pass         http://127.0.0.1:$APP_PORT/auth/;
                    proxy_http_version 1.1;
                    proxy_set_header   Host              \$host;
                    proxy_set_header   X-Real-IP         \$remote_addr;
                    proxy_set_header   X-Forwarded-For   \$proxy_add_x_forwarded_for;
                    proxy_set_header   X-Forwarded-Proto \$scheme;
                    proxy_read_timeout 30s;
                }

                location / {
                    return 404;
                }
            }
            NGINX_EOF

            # Enable the site and reload nginx.
            # On a fresh server the TLS certs may not exist yet; skip the
            # reload and print instructions for the initial certbot run.
            ln -sf "$NGINX_CONF" "$NGINX_LINK"
            if nginx -t 2>/dev/null; then
              nginx -s reload
            else
              echo "WARNING: nginx config test failed (TLS certs may not exist yet)."
              echo "To bootstrap Let's Encrypt on this server run:"
              echo "  sudo certbot certonly --webroot --webroot-path /var/www/certbot \\"
              echo "       -d $DOMAIN --email \$CERTBOT_EMAIL --agree-tos --non-interactive"
              echo "(set CERTBOT_EMAIL to your admin address before running)"
              echo "Then reload nginx manually: sudo nginx -s reload"
            fi

            # ── Docker container ────────────────────────────────────────────
            echo "Pulling $IMAGE"
            docker pull "$IMAGE"

            echo "Stopping existing container"
            docker stop mcp-yt-thumbnailer 2>/dev/null || true
            docker rm   mcp-yt-thumbnailer 2>/dev/null || true

            echo "Starting new container"
            docker run -d \
              --name mcp-yt-thumbnailer \
              --restart unless-stopped \
              -p 127.0.0.1:"$APP_PORT":3000 \
              -e GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
              -e GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              -e GOOGLE_REDIRECT_URI="${{ secrets.GOOGLE_REDIRECT_URI }}" \
              -v /srv/mcp-yt-thumbnailer/data:/data \
              "$IMAGE"

            echo "Deploy complete (environment: $DEPLOY_ENV, domain: $DOMAIN)"
